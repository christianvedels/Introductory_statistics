# An estimator of the variance

---
# The analogy principle

.pull-left-wide[
- Recall: we built the sample average by applying the analogy principle to the population mean
- We can apply the same principle to construct an estimator of the **variance**
]

--

.pull-left-wide[
- The variance of a discrete random variable `\(X\)` is:
$$
Var(X) = \sum_{i = 1}^N (x_i - \mu)^2 \cdot f_X(x_i)
$$
- To estimate `\(\sigma^2\)`, replace all unknown population quantities with sample counterparts
]

---
# Variance estimator when `\(\mu\)` is known

.pull-left-wide[
- Suppose we know the population mean `\(\mu\)`
- The only unknown is `\(f_X(x_i)\)`, which we replace with `\(1/n\)`
]

--

.pull-left-wide[
&gt; When `\(\mu\)` is known, the variance estimator is:
$$
\tilde{S}^2 = \frac{1}{n} \cdot \sum_{i = 1}^n (X_i - \mu)^2
$$
- `\(\tilde{S}^2\)` is an **unbiased** estimator of `\(\sigma^2\)`
]

---
# Variance estimator when `\(\mu\)` is unknown

.pull-left-wide[
- In general `\(\mu\)` is unknown, so we replace it with `\(\bar{X}\)`
- The naive plug-in estimator is:
$$
b^2 = \frac{1}{n} \cdot \sum_{i = 1}^n \left( X_i - \bar{X} \right)^2
$$
- But `\(b^2\)` is **biased**: `\(E(b^2) = \dfrac{n-1}{n} \cdot \sigma^2\)`
]

--

.pull-left-wide[
&gt; Correcting for the bias gives the **sample variance**:
$$
S^2 = \frac{1}{n - 1} \cdot \sum_{i = 1}^n \left( X_i - \bar{X} \right)^2
$$
- `\(S^2\)` is an **unbiased** and **consistent** estimator of `\(\sigma^2\)`
]

---
# An estimator of the standard deviation

.pull-left-wide[
- A natural estimator of `\(\sigma\)` is `\(S = \sqrt{S^2}\)`
]

--

.pull-left-wide[
- However, `\(E[g(X)] \neq g[E(X)]\)` in general, so:
$$
E(S) = E\!\left(\sqrt{S^2}\right) \neq \sqrt{E(S^2)} = \sqrt{\sigma^2} = \sigma
$$
- `\(S\)` is a **biased** estimator of `\(\sigma\)` (but it is **consistent**)
]

---
# Distribution of `\(S^2\)`: the chi-square

.pull-left-wide[
- It is easier to work with the scaled quantity:
$$
Y = S^2 \cdot \frac{n-1}{\sigma^2}
$$
]

--

.pull-left-wide[
- In a normal population, `\(Y\)` follows a **chi-square** distribution with `\(n-1\)` degrees of freedom: `\(Y \sim \chi^2(n-1)\)`
- This lets us find `\(F(S^2 \leq a)\)` by converting to a `\(\chi^2\)` probability:
$$
F(S^2 \leq a) = P\!\left(Y \leq a \cdot \frac{n-1}{\sigma^2}\right)
$$
- The `\(\chi^2\)` distribution is **not symmetric** and takes only positive values
]

---

.pull-left-wide[
**Q1.** Why do we divide by `\(n - 1\)` rather than `\(n\)` in the sample variance `\(S^2\)`?

- **A)** Replacing `\(\mu\)` with `\(\bar{X}\)` uses up one degree of freedom, making `\(b^2 = \frac{1}{n}\sum(X_i - \bar{X})^2\)` systematically too small — dividing by `\(n-1\)` corrects the bias
- **B)** Dividing by `\(n - 1\)` makes `\(S^2\)` a consistent estimator, whereas dividing by `\(n\)` does not
- **C)** It is a convention with no statistical justification
]

--

.pull-left-wide[
**Q2.** `\(S^2\)` is unbiased for `\(\sigma^2\)`. Is `\(S = \sqrt{S^2}\)` unbiased for `\(\sigma\)`?

- **A)** Yes — the square root of an unbiased estimator is also unbiased
- **B)** Yes — because `\(S^2\)` is consistent, `\(S\)` inherits unbiasedness
- **C)** No — `\(E(\sqrt{S^2}) \neq \sqrt{E(S^2)}\)` in general, so `\(S\)` is biased (though consistent)
]

# Estimators of higher-order moments

---
# Central moments

.pull-left-wide[
- The `\(k\)`-th **central moment** of `\(X\)` is:
$$
m_k^* = E\!\left([X - E(X)]^k\right) = \sum_{i=1}^N \left[(x_i - \mu)^k \cdot f_X(x_i)\right]
$$
]

--

.pull-left-wide[
- The analogy principle gives the estimator:
$$
\hat{m}_k^* = \frac{1}{n} \cdot \sum_{i=1}^n \left(X_i - \bar{X}\right)^k
$$
- Similarly, the estimator of the `\(k\)`-th (raw) moment `\(E(X^k)\)` is `\(\hat{m}_k = \frac{1}{n}\sum_{i=1}^n X_i^k\)`
]

---
# Skewness

.pull-left-wide[
- Raw moments depend on the unit of measurement — doubling the scale doubles the moment
- We want scale-independent measures
]

--

.pull-left-wide[
&gt; **Skewness** is the standardised third central moment:
$$
\gamma_3 = \frac{m_3^*}{\sigma^3}, \qquad \hat{\gamma}_3 = \frac{\hat{m}_3^*}{S^3}
$$

- `\(\gamma_3 &gt; 0\)`: right-skewed (long right tail)
- `\(\gamma_3 &lt; 0\)`: left-skewed (long left tail)
- `\(\gamma_3 = 0\)`: symmetric (e.g. the normal distribution)
]

---
# Kurtosis

.pull-left-wide[
&gt; **Kurtosis** is the standardised fourth central moment:
$$
\gamma_4 = \frac{m_4^*}{\sigma^4}, \qquad \hat{\gamma}_4 = \frac{\hat{m}_4^*}{S^4}
$$

- Measures the "peakedness" and tail weight of the distribution
- For the normal distribution: `\(\gamma_3 = 0\)` and `\(\gamma_4 = 3\)`
]

--

.pull-left-wide[
- Skewness and kurtosis are primarily used to **compare a distribution to the normal**
- Deviations from `\(\gamma_3 = 0\)` or `\(\gamma_4 = 3\)` signal non-normality
]

---

# Estimators of the covariance and the correlation coefficient

---
# An estimator of the covariance

.pull-left-wide[
- The covariance between `\(X\)` and `\(Y\)` is:
$$
Cov(X, Y) = E\!\left[(X - \mu_X)(Y - \mu_Y)\right]
$$
]

--

.pull-left-wide[
&gt; The **sample covariance** is:
$$
\widehat{Cov}(X, Y) = \frac{1}{n} \cdot \sum_{i=1}^n \left(X_i - \bar{X}\right)\!\left(Y_i - \bar{Y}\right)
$$
- Constructed by replacing `\(\mu_X\)`, `\(\mu_Y\)`, and `\(f(x_i, y_j)\)` with their sample counterparts
]

---
# An estimator of the correlation coefficient

.pull-left-wide[
- The population correlation coefficient is:
$$
\rho(X, Y) = \frac{Cov(X, Y)}{\sqrt{Var(X) \cdot Var(Y)}}
$$
]

--

.pull-left-wide[
&gt; The **sample correlation coefficient** is:
$$
\hat{\rho}(X, Y) = \frac{\widehat{Cov}(X, Y)}{\sqrt{S_X^2 \cdot S_Y^2}}
$$
- For large `\(n\)`: `\(\hat{\rho}(X, Y) \overset{a}{\sim} \mathcal{N}\!\left(\rho,\, \dfrac{(1 - \rho^2)^2}{n - 2}\right)\)`
]

---

**Q1.** `\(\widehat{Cov}(X, Y) = 0\)` in a sample. Can we conclude that `\(X\)` and `\(Y\)` are independent?

- **A)** No — zero covariance rules out a linear relationship but not non-linear dependence
- **B)** Yes — zero covariance is equivalent to independence
- **C)** Only if both `\(X\)` and `\(Y\)` are normally distributed, since normality makes independence and zero covariance equivalent
]

--

.pull-left-wide[
**Q2.** `\(\hat{\rho} = 0.9\)` between education and income. A colleague concludes "education causes higher income." What is the problem?

- **A)** Nothing — high correlation always implies causation
- **B)** Correlation measures linear association, not causation — a common cause (e.g. family background) could drive both
- **C)** The formula for `\(\hat{\rho}\)` is only valid when both variables are normally distributed
]

# Estimating a distribution

---
# The empirical distribution function

.pull-left-wide[
- Sometimes estimating moments is not enough — we want to know the shape of the full distribution
- Recall that the CDF is defined as `\(F_X(x) = P(X \leq x)\)`
]

--

.pull-left-wide[
- By the analogy principle: `\(P(X \leq x)\)` is estimated by the fraction of sample observations `\(\leq x\)`
]

--

.pull-left-wide[
&gt; The **empirical distribution function** (EDF) is:
$$
\hat{F}_X(x) = \frac{\text{number of sample elements with } x_i \leq x}{n}
$$
]

---
# Properties of the EDF

.pull-left-wide[
- For a simple random sample, `\(\hat{F}_X(x)\)` is **unbiased** and **consistent**:
$$
E\!\left[\hat{F}_X(x)\right] = F_X(x) \quad \text{for all } x
$$
]

--

.pull-left-wide[
- For large `\(n\)`, `\(\hat{F}_X(x)\)` is approximately normal for each fixed `\(x\)`:
$$
\hat{F}_X(x) \overset{a}{\sim} \mathcal{N}\!\left(F_X(x),\; \frac{F_X(x)\left[1 - F_X(x)\right]}{n}\right)
$$
]

---

- **B)** The probability that `\(X = 3\)` in the population is 0.4
- **C)** The 40th percentile of the distribution equals 3

- **B)** Because `\(\hat{F}_X(x)\)` is a sample proportion — the mean of Bernoulli indicators `\(\mathbf{1}(X_i \leq x)\)` — and the CLT applies
- **C)** Because all sample statistics are approximately normal for large `\(n\)`
]

# Estimators of quantiles

---
# Estimated quantiles

.pull-left-wide[
- Recall: the `\(p\)`-th quantile `\(q_p\)` is the value where `\(F_X\)` crosses `\(p\)`
- We estimate quantiles from the empirical distribution function: `\(\hat{q}_p\)` is where `\(\hat{F}_X\)` crosses `\(p\)`
]

--

.pull-left-wide[
- For example, the **sample median** `\(\hat{q}_{0.5}\)` is the value where `\(\hat{F}_X\)` crosses 0.5
- If this crossing happens over an interval, we use the midpoint as the sample median
]

---
# Order statistics

.pull-left-wide[
- The **$k$-th order statistic** `\(X_{(k)}\)` is the `\(k\)`-th smallest observation in the sample
]

--

.pull-left-wide[
&gt; The estimator of the `\(p\)`-th quantile using order statistics:
$$
\hat{q}_p =
`\begin{cases}
X_{(np + 1)}, &amp; \text{if } [np] \neq np \\[4pt]
\dfrac{X_{(np)} + X_{(np + 1)}}{2}, &amp; \text{if } [np] = np
\end{cases}`
$$
where `\([np]\)` denotes the integer part of `\(np\)`
]

---
# Sample median

.pull-left-wide[
- For the sample median (`\(p = 0.5\)`), the formula simplifies to:

$$
\hat{q}_{0.5} =
`\begin{cases}
X_{\left(\frac{n+1}{2}\right)}, &amp; \text{if } n \text{ is odd} \\[6pt]
\dfrac{X_{\left(\frac{n}{2}\right)} + X_{\left(\frac{n}{2}+1\right)}}{2}, &amp; \text{if } n \text{ is even}
\end{cases}`
$$
]

--

.pull-left-wide[
- The sample median is robust to outliers — unlike the sample mean
- When a distribution is skewed, the median is often a better summary of the "typical" value
]

# Key takeaways

.pull-left-wide[
**Variance:** `\(S^2 = \frac{1}{n-1}\sum(X_i - \bar{X})^2\)` — unbiased; `\(S\)` is biased but consistent for `\(\sigma\)`

**Higher-order moments:** `\(\hat{m}_k^* = \frac{1}{n}\sum(X_i - \bar{X})^k\)` — skewness (`\(\gamma_3\)`) and kurtosis (`\(\gamma_4\)`) compare shape to the normal
]

--

.pull-left-wide[
**Covariance and correlation:**
`$$\widehat{Cov}(X,Y) = \frac{1}{n}\sum(X_i-\bar{X})(Y_i-\bar{Y}), \quad \hat{\rho} = \frac{\widehat{Cov}(X,Y)}{\sqrt{S_X^2 S_Y^2}}$$`
]

--

.pull-left-wide[
**EDF and quantiles:** `\(\hat{F}_X(x) = \frac{\#\{x_i \leq x\}}{n}\)` — unbiased, consistent, asymptotically normal; quantiles estimated via order statistics
]

(function(d) {

    if (p > 1) return null; // traverse up no further than grandparent
    const el = line.parentElement;
    return el.tagName === "PRE" ? el : findPreParent(el, ++p);
